<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz QCM — Web &amp; Dev Technologies</title>
  <link rel="icon" href="data:,">

  <!-- Tailwind CSS v4 CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- Alpine.js CDN -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <style type="text/tailwindcss">
    @variant dark (&:where(.dark, .dark *));

    @theme {
      --color-laravel: #f05340;
      --color-php:     #7c3aed;
      --color-js:      #eab308;
      --color-python:  #3b82f6;
      --color-html:    #f97316;
      --color-css:     #06b6d4;
      --color-react:   #61dafb;
      --color-poo:     #10b981;
      --color-uml:     #f59e0b;
    }

    [x-cloak] { display: none !important; }

    /* Custom scrollbar for config list */
    .config-scroll::-webkit-scrollbar { width: 5px; }
    .config-scroll::-webkit-scrollbar-track { background: transparent; }
    .config-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 99px; }

    /* Smooth screen transitions */
    .screen-enter { animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    /* Code styling inside question/feedback HTML */
    .prose-quiz code {
      background: rgba(99,102,241,0.15);
      color: #a5b4fc;
      padding: 0.1em 0.35em;
      border-radius: 4px;
      font-size: 0.9em;
      font-family: ui-monospace, monospace;
    }
    .dark .prose-quiz code {
      background: rgba(99,102,241,0.2);
      color: #a5b4fc;
    }
    .prose-quiz strong { color: inherit; font-weight: 700; }
  </style>
</head>

<body
  x-data="quiz()"
  x-init="init()"
  x-cloak
  class="min-h-screen bg-slate-100 dark:bg-slate-950 text-slate-800 dark:text-slate-100 flex items-center justify-center p-4 sm:p-6 transition-colors duration-300 font-sans"
>

  <!-- ═══════════════════════════════════════════
       CARD WRAPPER
  ════════════════════════════════════════════ -->
  <div class="w-full max-w-xl sm:max-w-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl shadow-2xl p-6 sm:p-10 relative">

    <!-- Dark / Light Toggle -->
    <button
      @click="toggleDark()"
      class="fixed top-4 right-4 w-9 h-9 flex items-center justify-center rounded-full bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-500 dark:text-slate-400 transition-colors cursor-pointer"
      :title="dark ? 'Mode clair' : 'Mode sombre'"
    >
      <!-- Sun icon -->
      <svg x-show="dark" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      <!-- Moon icon -->
      <svg x-show="!dark" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>

    <!-- ══ WELCOME SCREEN ══ -->
    <div x-show="screen === 'welcome'"
      x-transition:enter="transition ease-out duration-200"
      x-transition:enter-start="opacity-0 translate-y-1"
      x-transition:enter-end="opacity-100 translate-y-0"
      x-transition:leave="transition ease-in duration-150"
      x-transition:leave-start="opacity-100"
      x-transition:leave-end="opacity-0"
      class="screen-enter">

      <h1 class="text-3xl sm:text-4xl font-extrabold text-center mb-2 bg-gradient-to-br from-indigo-500 to-violet-500 bg-clip-text text-transparent">
        Quiz QCM
      </h1>
      <p class="text-center text-slate-500 dark:text-slate-400 mb-8 text-sm sm:text-base">
        Technologies Web &amp; Développement
      </p>

      <!-- Stats row -->
      <div class="flex flex-wrap justify-center gap-4 sm:gap-8 mb-8">
        <div class="flex flex-col items-center">
          <span class="text-2xl font-bold text-indigo-500">135</span>
          <span class="text-xs text-slate-500 dark:text-slate-400">Questions</span>
        </div>
        <div class="w-px bg-slate-200 dark:bg-slate-700 hidden sm:block"></div>
        <div class="flex flex-col items-center">
          <span class="text-2xl font-bold text-violet-500">9</span>
          <span class="text-xs text-slate-500 dark:text-slate-400">Thèmes</span>
        </div>
        <div class="w-px bg-slate-200 dark:bg-slate-700 hidden sm:block"></div>
        <div class="flex flex-col items-center">
          <span class="text-2xl font-bold text-fuchsia-500">3</span>
          <span class="text-xs text-slate-500 dark:text-slate-400">Niveaux</span>
        </div>
      </div>

      <!-- Topics grid -->
      <div class="grid grid-cols-3 sm:grid-cols-3 gap-2 sm:gap-3 mb-8">
        <template x-for="topic in TOPICS" :key="topic">
          <div class="flex flex-col items-center gap-1.5 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-3 text-xs font-semibold">
            <span class="w-3 h-3 rounded-full flex-shrink-0" :style="`background:${TOPIC_COLORS[topic]}`"></span>
            <span x-text="topic" class="text-slate-700 dark:text-slate-300 text-center leading-tight"></span>
          </div>
        </template>
      </div>

      <button
        @click="screen = 'config'"
        class="w-full py-3.5 bg-indigo-600 hover:bg-indigo-500 active:scale-[.98] text-white font-bold rounded-xl transition-all duration-150 cursor-pointer text-sm sm:text-base"
      >
        ⚙️ Configurer le Quiz →
      </button>
    </div>

    <!-- ══ CONFIG SCREEN ══ -->
    <div x-show="screen === 'config'"
      x-transition:enter="transition ease-out duration-200"
      x-transition:enter-start="opacity-0 translate-y-1"
      x-transition:enter-end="opacity-100 translate-y-0"
      x-transition:leave="transition ease-in duration-150"
      x-transition:leave-start="opacity-100"
      x-transition:leave-end="opacity-0"
      class="screen-enter">

      <h2 class="text-xl sm:text-2xl font-extrabold text-center mb-1">⚙️ Configurer le Quiz</h2>
      <p class="text-center text-slate-500 dark:text-slate-400 text-sm mb-5">
        Choisissez le niveau et le nombre de questions par thème
      </p>

      <!-- Level selector -->
      <div class="flex justify-center gap-2 sm:gap-3 mb-6">
        <button
          @click="selectedLevel = 'facile'"
          :class="selectedLevel === 'facile'
            ? 'bg-emerald-500 border-emerald-500 text-white'
            : 'bg-slate-100 dark:bg-slate-800 border-slate-200 dark:border-slate-600 text-slate-500 dark:text-slate-400 hover:border-emerald-400'"
          class="px-4 py-2 border-2 rounded-full text-sm font-semibold transition-all duration-150 cursor-pointer"
        >Facile</button>
        <button
          @click="selectedLevel = 'moyen'"
          :class="selectedLevel === 'moyen'
            ? 'bg-amber-400 border-amber-400 text-black'
            : 'bg-slate-100 dark:bg-slate-800 border-slate-200 dark:border-slate-600 text-slate-500 dark:text-slate-400 hover:border-amber-400'"
          class="px-4 py-2 border-2 rounded-full text-sm font-semibold transition-all duration-150 cursor-pointer"
        >Moyen</button>
        <button
          @click="selectedLevel = 'difficile'"
          :class="selectedLevel === 'difficile'
            ? 'bg-red-500 border-red-500 text-white'
            : 'bg-slate-100 dark:bg-slate-800 border-slate-200 dark:border-slate-600 text-slate-500 dark:text-slate-400 hover:border-red-400'"
          class="px-4 py-2 border-2 rounded-full text-sm font-semibold transition-all duration-150 cursor-pointer"
        >Difficile</button>
      </div>

      <!-- Topics list -->
      <div class="flex flex-col gap-2 max-h-72 overflow-y-auto config-scroll pr-1 mb-4">
        <template x-for="topic in TOPICS" :key="topic">
          <div class="flex items-center justify-between bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-3 sm:px-4 py-2.5">
            <div class="flex items-center gap-2.5">
              <span class="w-2.5 h-2.5 rounded-full flex-shrink-0" :style="`background:${TOPIC_COLORS[topic]}`"></span>
              <span x-text="topic" class="text-sm font-semibold"></span>
            </div>
            <div class="flex gap-1">
              <template x-for="n in [0,1,2,3,4,5]" :key="n">
                <button
                  @click="topicSelections[topic] = n"
                  :class="topicSelections[topic] === n
                    ? 'text-white scale-110'
                    : 'bg-slate-200 dark:bg-slate-700 text-slate-500 dark:text-slate-400 hover:bg-slate-300 dark:hover:bg-slate-600'"
                  :style="topicSelections[topic] === n ? `background:${TOPIC_COLORS[topic]}` : ''"
                  class="w-7 h-7 rounded-full text-xs font-bold transition-all duration-100 cursor-pointer"
                  x-text="n"
                ></button>
              </template>
            </div>
          </div>
        </template>
      </div>

      <!-- Footer -->
      <div class="border-t border-slate-200 dark:border-slate-700 pt-4">
        <p class="text-center text-sm text-slate-500 dark:text-slate-400 mb-3">
          Total : <strong class="text-indigo-500 text-base" x-text="configTotal"></strong> questions sélectionnées
        </p>
        <div class="flex gap-2 mb-3">
          <button
            @click="setAllTopics(5)"
            class="flex-1 py-2 text-xs font-medium bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg transition-colors cursor-pointer"
          >Tout à 5</button>
          <button
            @click="setAllTopics(0)"
            class="flex-1 py-2 text-xs font-medium bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg transition-colors cursor-pointer"
          >Tout désactiver</button>
        </div>
        <button
          @click="startConfiguredQuiz()"
          :disabled="configTotal === 0"
          class="w-full py-3.5 bg-indigo-600 hover:bg-indigo-500 disabled:opacity-40 disabled:cursor-not-allowed active:scale-[.98] text-white font-bold rounded-xl transition-all duration-150 cursor-pointer text-sm sm:text-base"
        >Commencer le Quiz →</button>
        <p
          x-show="configTotal === 0"
          class="text-center text-xs text-red-500 mt-2"
        >Veuillez sélectionner au moins une question</p>
      </div>

      <button
        @click="screen = 'welcome'"
        class="w-full mt-3 py-2.5 text-sm font-semibold border-2 border-indigo-500 text-indigo-500 hover:bg-indigo-500 hover:text-white rounded-xl transition-all duration-150 cursor-pointer"
      >← Retour à l'accueil</button>
    </div>

    <!-- ══ QUIZ SCREEN ══ -->
    <div x-show="screen === 'quiz'"
      x-transition:enter="transition ease-out duration-200"
      x-transition:enter-start="opacity-0 translate-y-1"
      x-transition:enter-end="opacity-100 translate-y-0"
      x-transition:leave="transition ease-in duration-150"
      x-transition:leave-start="opacity-100"
      x-transition:leave-end="opacity-0"
      class="screen-enter">

      <!-- Header: counter + progress + score -->
      <div class="flex items-center gap-3 mb-5">
        <span class="text-xs text-slate-500 dark:text-slate-400 whitespace-nowrap font-medium" x-text="`${currentIndex + 1} / ${activeQuiz.length}`"></span>
        <div class="flex-1 bg-slate-200 dark:bg-slate-700 rounded-full h-2 overflow-hidden">
          <div
            class="h-full bg-gradient-to-r from-indigo-500 to-violet-500 rounded-full transition-all duration-500 ease-out"
            :style="`width: ${progress}%`"
          ></div>
        </div>
        <span class="text-xs text-slate-500 dark:text-slate-400 whitespace-nowrap font-medium" x-text="`Score : ${score}`"></span>
      </div>

      <!-- Topic badge -->
      <template x-if="currentQuestion">
        <span
          class="inline-block px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider mb-3 text-white"
          :style="`background: ${TOPIC_COLORS[currentQuestion.topic]};
            color: ${['JS','React','UML'].includes(currentQuestion.topic) ? '#000' : '#fff'}`"
          x-text="currentQuestion.topic"
        ></span>
      </template>

      <!-- Question -->
      <template x-if="currentQuestion">
        <p class="text-base sm:text-lg font-semibold leading-relaxed mb-5 prose-quiz" x-html="currentQuestion.q"></p>
      </template>

      <!-- Options -->
      <div class="flex flex-col gap-2.5 mb-4">
        <template x-if="currentQuestion">
          <template x-for="(opt, i) in currentQuestion.opts" :key="i">
            <button
              @click="selectAnswer(i)"
              :disabled="answered"
              :class="{
                'border-emerald-500 bg-emerald-500/10': answered && i === currentQuestion.ans,
                'border-red-500 bg-red-500/10': answered && i === chosenAnswer && i !== currentQuestion.ans,
                'border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 hover:border-indigo-400 hover:bg-indigo-50 dark:hover:bg-indigo-900/20': !answered,
                'border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800': answered && i !== currentQuestion.ans && i !== chosenAnswer
              }"
              class="flex items-center gap-3 w-full border-2 rounded-xl px-4 py-3 text-left text-sm transition-all duration-150 cursor-pointer disabled:cursor-default"
            >
              <span
                :class="{
                  'bg-emerald-500 text-white': answered && i === currentQuestion.ans,
                  'bg-red-500 text-white': answered && i === chosenAnswer && i !== currentQuestion.ans,
                  'bg-slate-200 dark:bg-slate-700 text-slate-600 dark:text-slate-300': !answered || (answered && i !== currentQuestion.ans && i !== chosenAnswer)
                }"
                class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0 transition-colors duration-150"
                x-text="['A','B','C','D'][i]"
              ></span>
              <span class="prose-quiz" x-html="opt"></span>
            </button>
          </template>
        </template>
      </div>

      <!-- Feedback -->
      <div
        x-show="answered"
        x-transition
        :class="chosenAnswer === currentQuestion?.ans
          ? 'border-emerald-500 bg-emerald-500/5'
          : 'border-red-500 bg-red-500/5'"
        class="border-l-4 rounded-r-xl px-4 py-3 text-sm text-slate-600 dark:text-slate-300 mb-4 prose-quiz"
        x-html="feedbackText"
      ></div>

      <!-- Next button -->
      <button
        x-show="answered"
        x-transition
        @click="nextQuestion()"
        class="w-full py-3.5 bg-indigo-600 hover:bg-indigo-500 active:scale-[.98] text-white font-bold rounded-xl transition-all duration-150 cursor-pointer text-sm sm:text-base"
        x-text="currentIndex + 1 < activeQuiz.length ? 'Question suivante →' : 'Voir les résultats →'"
      ></button>
    </div>

    <!-- ══ SCORE SCREEN ══ -->
    <div x-show="screen === 'score'"
      x-transition:enter="transition ease-out duration-200"
      x-transition:enter-start="opacity-0 translate-y-1"
      x-transition:enter-end="opacity-100 translate-y-0"
      x-transition:leave="transition ease-in duration-150"
      x-transition:leave-start="opacity-100"
      x-transition:leave-end="opacity-0"
      class="screen-enter">

      <!-- Score circle -->
      <div
        class="w-36 h-36 rounded-full mx-auto mb-6 flex flex-col items-center justify-center border-[6px] bg-gradient-radial from-slate-800 to-slate-950 shadow-lg"
        :style="`border-color: ${scoreColor}`"
      >
        <span class="text-4xl font-black leading-none" x-text="score"></span>
        <span class="text-xs text-slate-500 dark:text-slate-400 mt-0.5" x-text="`/ ${activeQuiz.length}`"></span>
      </div>

      <h2 class="text-xl sm:text-2xl font-extrabold text-center mb-1" x-text="`${scorePct}% de réussite`"></h2>
      <p class="text-center text-slate-500 dark:text-slate-400 text-sm mb-6" x-text="scoreMsg"></p>

      <!-- Breakdown -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 mb-7">
        <template x-for="[topic, data] in Object.entries(topicScores).filter(([,d]) => d.total > 0)" :key="topic">
          <div class="flex items-center gap-2.5 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-2.5">
            <span class="w-2.5 h-2.5 rounded-full flex-shrink-0" :style="`background:${TOPIC_COLORS[topic]}`"></span>
            <span class="text-sm font-medium" x-text="topic"></span>
            <span class="ml-auto text-sm font-bold text-indigo-400" x-text="`${data.correct} / ${data.total}`"></span>
          </div>
        </template>
      </div>

      <button
        @click="restartQuiz()"
        class="w-full py-3.5 bg-indigo-600 hover:bg-indigo-500 active:scale-[.98] text-white font-bold rounded-xl transition-all duration-150 cursor-pointer text-sm sm:text-base mb-3"
      >Recommencer le Quiz</button>
      <button
        @click="screen = 'welcome'"
        class="w-full py-3 text-sm font-semibold border-2 border-indigo-500 text-indigo-500 hover:bg-indigo-500 hover:text-white rounded-xl transition-all duration-150 cursor-pointer"
      >← Retour à l'accueil</button>
    </div>

  </div><!-- /card -->

<script>
const TOPICS = ["Laravel","PHP","JS","Python","HTML","CSS","React","POO","UML"];
const TOPIC_COLORS = {
  Laravel:"#f05340", PHP:"#7c3aed", JS:"#eab308", Python:"#3b82f6",
  HTML:"#f97316", CSS:"#06b6d4", React:"#61dafb", POO:"#10b981", UML:"#f59e0b"
};

const QUESTIONS = [
  // ═══ LARAVEL FACILE ═══
  { topic:"Laravel", level:"facile", q:"Comment créer un nouveau projet Laravel ?", opts:["laravel new nom","php artisan new nom","composer create-project laravel nom","install laravel"], ans:2, exp:"<code>composer create-project laravel/laravel nom</code> crée un nouveau projet." },
  { topic:"Laravel", level:"facile", q:"Quelle commande affiche la liste des routes dans Laravel ?", opts:["php artisan route:list","php artisan routes","php artisan list routes","php artisan show:routes"], ans:0, exp:"<code>php artisan route:list</code> affiche toutes les routes enregistrées." },
  { topic:"Laravel", level:"facile", q:"Comment exécuter les migrations de base de données ?", opts:["php artisan migrate","php artisan db:migrate","php artisan database:migrate","php artisan run:migration"], ans:0, exp:"<code>php artisan migrate</code> applique les migrations en attente." },
  { topic:"Laravel", level:"facile", q:"Quel fichier contient la configuration principale de Laravel ?", opts:[".env","config.php","app.php","laravel.config"], ans:0, exp:"Le fichier <code>.env</code> contient les variables d'environnement et la config." },
  { topic:"Laravel", level:"facile", q:"Comment ouvrir le tinker interactif dans Laravel ?", opts:["php artisan tinker","php artisan shell","php artisan console","php artisan interact"], ans:0, exp:"<code>php artisan tinker</code> ouvre un REPL interactif pour tester du code." },

  // ═══ LARAVEL MOYEN ═══
  { topic:"Laravel", level:"moyen", q:"Quelle commande Artisan permet de créer un nouveau contrôleur ?", opts:["php artisan make:model","php artisan make:controller","php artisan create:controller","php artisan new:controller"], ans:1, exp:"<code>php artisan make:controller NomController</code> crée un contrôleur." },
  { topic:"Laravel", level:"moyen", q:"Dans Laravel, quel fichier contient la configuration de la base de données ?", opts:[".env et config/database.php","config/app.php","routes/web.php","bootstrap/app.php"], ans:0, exp:"Les paramètres DB sont dans <code>.env</code> et lus par <code>config/database.php</code>." },
  { topic:"Laravel", level:"moyen", q:"Quelle méthode Eloquent permet de récupérer tous les enregistrements ?", opts:["Model::find()","Model::first()","Model::all()","Model::get()"], ans:2, exp:"<code>Model::all()</code> retourne une Collection de tous les enregistrements." },
  { topic:"Laravel", level:"moyen", q:"À quoi sert le middleware <code>auth</code> ?", opts:["Compresser les réponses HTTP","Vérifier que l'utilisateur est authentifié","Gérer les erreurs 404","Valider les formulaires"], ans:1, exp:"Le middleware <code>auth</code> protège les routes et redirige si non authentifié." },
  { topic:"Laravel", level:"moyen", q:"Comment définir une relation « un à plusieurs » dans Eloquent ?", opts:["belongsTo()","hasMany()","hasManyThrough()","morphMany()"], ans:1, exp:"<code>hasMany()</code> est utilisé sur le modèle parent pour une relation 1:N." },

  // ═══ LARAVEL DIFFICILE ═══
  { topic:"Laravel", level:"difficile", q:"Quelle méthode utilise-t-on pour écraser un événement système dans un ServiceProvider ?", opts:["Event::listen()","Event::override()","Event::subscribe()","Event::handle()"], ans:0, exp:"On utilise <code>Event::listen()</code> dans le boot() du ServiceProvider pour écraser un événement." },
  { topic:"Laravel", level:"difficile", q:"Comment implémenter un singleton avec Laravel Container ?", opts:["$app->singleton()","$app->single()","$app->makeSingle()","$app->instance()"], ans:0, exp:"<code>$app->singleton('nom', closure)</code> enregistre une liaison résolue une seule fois." },
  { topic:"Laravel", level:"difficile", q:"Quel est le rôle du Morph Model dans Eloquent ( polymorphic ) ?", opts:["Créer plusieurs relations","Lier un modèle à plusieurs modèles parents","Dupliquer des modèles","Hériter dynamiquement"], ans:1, exp:"Le Morph permet à un modèle d'appartenir à plusieurs modèles via une seule colonne." },
  { topic:"Laravel", level:"difficile", q:"Comment fonctionne le lazy loading vs eager loading dans Eloquent ?", opts:["Eager charge tout upfront, lazy à la demande","Lazy charge les relations uniquement après le premier accès","Il n'y a pas de différence","Eager désactive les relations"], ans:0, exp:"Eager charge les relations en une seule requête (N+1 solve), lazy les charge séparément." },

function quiz() {
  return {
    TOPICS,
    TOPIC_COLORS,

    // ── UI state ──
    screen: 'welcome',
    dark: true,

    // ── Config state ──
    selectedLevel: 'moyen',
    topicSelections: Object.fromEntries(TOPICS.map(t => [t, 5])),

    // ── Quiz state ──
    activeQuiz: [],
    currentIndex: 0,
    score: 0,
    topicScores: {},
    answered: false,
    chosenAnswer: null,
    feedbackText: '',

    // ── Score state ──
    scoreColor: '#6366f1',
    scorePct: 0,
    scoreMsg: '',

    // ── Computed ──
    get currentQuestion() {
      return this.activeQuiz[this.currentIndex] ?? null;
    },
    get progress() {
      if (!this.activeQuiz.length) return 0;
      return (this.currentIndex / this.activeQuiz.length) * 100;
    },
    get configTotal() {
      return Object.values(this.topicSelections).reduce((a, b) => a + b, 0);
    },

    // ── Lifecycle ──
    init() {
      const saved = localStorage.getItem('dark');
      this.dark = saved !== null ? saved === 'true' : true;
      document.documentElement.classList.toggle('dark', this.dark);
    },

    // ── Dark toggle ──
    toggleDark() {
      this.dark = !this.dark;
      document.documentElement.classList.toggle('dark', this.dark);
      localStorage.setItem('dark', this.dark);
    },

    // ── Config ──
    setAllTopics(n) {
      TOPICS.forEach(t => { this.topicSelections[t] = n; });
    },

    // ── Shuffle ──
    shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    },

    // ── Start quiz ──
    startConfiguredQuiz() {
      if (this.configTotal === 0) return;

      this.activeQuiz = [];
      this.topicScores = Object.fromEntries(TOPICS.map(t => [t, { correct: 0, total: 0 }]));

      TOPICS.forEach(topic => {
        const count = this.topicSelections[topic];
        if (count === 0) return;
        const pool = QUESTIONS.filter(q => q.topic === topic && q.level === this.selectedLevel);
        const selected = this.shuffle(pool).slice(0, count);
        this.activeQuiz.push(...selected);
        this.topicScores[topic].total = selected.length;
      });

      this.activeQuiz = this.shuffle(this.activeQuiz);
      this.currentIndex = 0;
      this.score = 0;
      this.answered = false;
      this.chosenAnswer = null;
      this.feedbackText = '';
      this.screen = 'quiz';
    },

    // ── Select answer ──
    selectAnswer(chosen) {
      if (this.answered) return;
      this.answered = true;
      this.chosenAnswer = chosen;

      const q = this.currentQuestion;

      if (chosen === q.ans) {
        this.score++;
        this.topicScores[q.topic].correct++;
        this.feedbackText = `✅ <strong>Bonne réponse !</strong> ${q.exp}`;
      } else {
        this.feedbackText = `❌ <strong>Mauvaise réponse.</strong> La bonne réponse était <strong>${['A','B','C','D'][q.ans]}</strong>. ${q.exp}`;
      }
    },

    // ── Next question ──
    nextQuestion() {
      this.currentIndex++;
      if (this.currentIndex < this.activeQuiz.length) {
        this.answered = false;
        this.chosenAnswer = null;
        this.feedbackText = '';
      } else {
        this.computeScore();
        this.screen = 'score';
      }
    },

    // ── Compute score ──
    computeScore() {
      const total = this.activeQuiz.length;
      this.scorePct = total > 0 ? Math.round((this.score / total) * 100) : 0;

      if (this.scorePct >= 80)      { this.scoreColor = '#22c55e'; this.scoreMsg = 'Excellent travail ! 🎉'; }
      else if (this.scorePct >= 60) { this.scoreColor = '#eab308'; this.scoreMsg = 'Bon résultat, continuez ! 👍'; }
      else if (this.scorePct >= 40) { this.scoreColor = '#f97316'; this.scoreMsg = 'Pas mal, encore un effort ! 📚'; }
      else                          { this.scoreColor = '#ef4444'; this.scoreMsg = 'Continuez à pratiquer 💪'; }
    },

    // ── Restart ──
    restartQuiz() {
      this.startConfiguredQuiz();
    }
  };
}
