<!DOCTYPE html>
<html lang="en" class="dark" :class="lang === 'ar' ? 'rtl' : 'ltr'" :dir="lang === 'ar' ? 'rtl' : 'ltr'">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz QCM — Web &amp; Dev Technologies</title>
  <link rel="icon" href="data:,">

  <!-- x-cloak must be plain CSS, applied before any scripts run -->
  <style>[x-cloak] { display: none !important; }</style>

  <!-- Tailwind CSS v4 CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- Alpine.js CDN -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <style type="text/tailwindcss">
    @variant dark (&:where(.dark, .dark *));

    /* Custom scrollbar for config list */
    .config-scroll::-webkit-scrollbar { width: 5px; }
    .config-scroll::-webkit-scrollbar-track { background: transparent; }
    .config-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 99px; }

    /* Code styling inside question/feedback HTML */
    .prose-quiz code {
      background: rgba(99,102,241,0.15);
      color: #a5b4fc;
      padding: 0.1em 0.35em;
      border-radius: 4px;
      font-size: 0.9em;
      font-family: ui-monospace, monospace;
    }
    .dark .prose-quiz code {
      background: rgba(99,102,241,0.2);
      color: #a5b4fc;
    }
    .prose-quiz strong { color: inherit; font-weight: 700; }
  </style>
</head>

<body
  x-data="quiz()"
  x-init="init()"
  x-cloak
  class="min-h-screen bg-slate-100 dark:bg-slate-950 text-slate-800 dark:text-slate-100 flex items-center justify-center p-4 sm:p-6 transition-colors duration-300 font-sans"
>

  <!-- ═══════════════════════════════════════════
       CARD WRAPPER
  ════════════════════════════════════════════ -->
  <div class="w-full max-w-xl sm:max-w-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl shadow-2xl p-6 sm:p-10 relative">

    <!-- Dark / Light Toggle -->
    <button type="button"
      @click="toggleDark()"
      class="fixed top-4 right-4 w-9 h-9 flex items-center justify-center rounded-full bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-500 dark:text-slate-400 transition-colors cursor-pointer"
      :title="dark ? t('mode_light') : t('mode_dark')"
    >
      <!-- Sun icon -->
      <svg x-show="dark" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      <!-- Moon icon -->
      <svg x-show="!dark" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>

    <!-- Language Toggle -->
    <button type="button"
      @click="showLangModal = true"
      class="fixed top-4 right-[3.5rem] sm:right-[3.5rem] w-9 h-9 flex items-center justify-center rounded-full bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-500 dark:text-slate-400 transition-colors cursor-pointer text-xs font-bold"
    >
      <span x-text="lang.toUpperCase()"></span>
    </button>

    <!-- Language Modal -->
    <div x-show="showLangModal"
      x-transition:enter="transition ease-out duration-150"
      x-transition:enter-start="opacity-0"
      x-transition:enter-end="opacity-100"
      x-transition:leave="transition ease-in duration-100"
      x-transition:leave-start="opacity-100"
      x-transition:leave-end="opacity-0"
      @click="showLangModal = false"
      dir="ltr"
      class="fixed inset-0 z-50 flex items-start justify-end pt-16 pr-4 sm:pr-4"
      style="background: rgba(0,0,0,0.3); backdrop-filter: blur(2px);"
    >
      <div @click.stop
        class="w-48 rounded-xl bg-white dark:bg-slate-800 shadow-2xl border border-slate-200 dark:border-slate-700 overflow-hidden"
        x-show="showLangModal"
        x-transition:enter="transition ease-out duration-200"
        x-transition:enter-start="opacity-0 scale-95 translate-x-2"
        x-transition:enter-end="opacity-100 scale-100 translate-x-0"
        x-transition:leave="transition ease-in duration-150"
        x-transition:leave-start="opacity-100 scale-100 translate-x-0"
        x-transition:leave-end="opacity-0 scale-95 translate-x-2"
      >
        <div class="px-4 py-3 border-b border-slate-100 dark:border-slate-700">
          <span class="text-sm font-semibold text-slate-700 dark:text-slate-300" x-text="t('choose_lang')"></span>
        </div>
        <div class="py-2">
          <button type="button"
            @click="setLang('en')"
            class="w-full px-4 py-2.5 flex items-center gap-3 text-left hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors"
            :class="lang === 'en' ? 'bg-indigo-50 dark:bg-indigo-900/20' : ''"
          >
            <span x-show="lang === 'en'" class="w-5 h-5 flex items-center justify-center rounded-full bg-indigo-500 text-white text-xs">✓</span>
            <span x-show="lang !== 'en'" class="w-5 h-5 rounded-full border border-slate-300 dark:border-slate-600"></span>
            <span class="text-sm font-medium" :class="lang === 'en' ? 'text-indigo-600 dark:text-indigo-400' : 'text-slate-600 dark:text-slate-400'">🇬🇧 English</span>
          </button>
          <button type="button"
            @click="setLang('ar')"
            class="w-full px-4 py-2.5 flex items-center gap-3 text-left hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors"
            :class="lang === 'ar' ? 'bg-indigo-50 dark:bg-indigo-900/20' : ''"
          >
            <span x-show="lang === 'ar'" class="w-5 h-5 flex items-center justify-center rounded-full bg-indigo-500 text-white text-xs">✓</span>
            <span x-show="lang !== 'ar'" class="w-5 h-5 rounded-full border border-slate-300 dark:border-slate-600"></span>
            <span class="text-sm font-medium" :class="lang === 'ar' ? 'text-indigo-600 dark:text-indigo-400' : 'text-slate-600 dark:text-slate-400'" dir="rtl">🇲🇦 العربية</span>
          </button>
          <button type="button"
            @click="setLang('fr')"
            class="w-full px-4 py-2.5 flex items-center gap-3 text-left hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors"
            :class="lang === 'fr' ? 'bg-indigo-50 dark:bg-indigo-900/20' : ''"
          >
            <span x-show="lang === 'fr'" class="w-5 h-5 flex items-center justify-center rounded-full bg-indigo-500 text-white text-xs">✓</span>
            <span x-show="lang !== 'fr'" class="w-5 h-5 rounded-full border border-slate-300 dark:border-slate-600"></span>
            <span class="text-sm font-medium" :class="lang === 'fr' ? 'text-indigo-600 dark:text-indigo-400' : 'text-slate-600 dark:text-slate-400'">🇫🇷 Français</span>
          </button>
        </div>
      </div>
    </div>

    <!-- ══ WELCOME SCREEN ══ -->
    <div x-show="screen === 'welcome'" x-transition>

      <h1 class="text-3xl sm:text-4xl font-extrabold text-center mb-2 bg-gradient-to-br from-indigo-500 to-violet-500 bg-clip-text text-transparent" x-text="t('quiz_qcm')"></h1>
      <p class="text-center text-slate-500 dark:text-slate-400 mb-8 text-sm sm:text-base" x-text="t('web_tech')"></p>

      <!-- Stats row -->
      <div class="flex flex-wrap justify-center gap-4 sm:gap-8 mb-8">
        <div class="flex flex-col items-center">
          <span class="text-2xl font-bold text-indigo-500">135</span>
          <span class="text-xs text-slate-500 dark:text-slate-400" x-text="t('questions')"></span>
        </div>
        <div class="w-px bg-slate-200 dark:bg-slate-700 hidden sm:block"></div>
        <div class="flex flex-col items-center">
          <span class="text-2xl font-bold text-violet-500">9</span>
          <span class="text-xs text-slate-500 dark:text-slate-400" x-text="t('themes')"></span>
        </div>
        <div class="w-px bg-slate-200 dark:bg-slate-700 hidden sm:block"></div>
        <div class="flex flex-col items-center">
          <span class="text-2xl font-bold text-fuchsia-500">3</span>
          <span class="text-xs text-slate-500 dark:text-slate-400" x-text="t('niveaux')"></span>
        </div>
      </div>

      <!-- Topics grid -->
      <div class="grid grid-cols-3 sm:grid-cols-3 gap-2 sm:gap-3 mb-8">
        <template x-for="topic in TOPICS" :key="topic">
          <div class="flex flex-col items-center gap-1.5 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-3 text-xs font-semibold">
            <span class="w-3 h-3 rounded-full flex-shrink-0" :style="`background:${TOPIC_COLORS[topic]}`"></span>
            <span x-text="topic" class="text-slate-700 dark:text-slate-300 text-center leading-tight"></span>
          </div>
        </template>
      </div>

      <button type="button" type="button"
        @click="screen = 'config'"
        class="w-full py-3.5 bg-indigo-600 hover:bg-indigo-500 active:scale-[.98] text-white font-bold rounded-xl transition-all duration-150 cursor-pointer text-sm sm:text-base"
      >
        ⚙️ <span x-text="t('configure_quiz')"></span> →
      </button>
    </div>

    <!-- ══ CONFIG SCREEN ══ -->
    <div x-show="screen === 'config'"
      style="display:none"
      x-transition
    >

      <h2 class="text-xl sm:text-2xl font-extrabold text-center mb-1">⚙️ <span x-text="t('configure')"></span></h2>
      <p class="text-center text-slate-500 dark:text-slate-400 text-sm mb-5" x-text="t('select_topic_questions')"></p>

      <!-- Level selector -->
      <div class="flex justify-center gap-2 sm:gap-3 mb-6">
        <button type="button"
          @click="selectedLevel = 'facile'"
          :class="selectedLevel === 'facile'
            ? 'bg-emerald-500 border-emerald-500 text-white'
            : 'bg-slate-100 dark:bg-slate-800 border-slate-200 dark:border-slate-600 text-slate-500 dark:text-slate-400 hover:border-emerald-400'"
          class="px-4 py-2 border-2 rounded-full text-sm font-semibold transition-all duration-150 cursor-pointer"
        ><span x-text="t('easy')"></span></button>
        <button type="button"
          @click="selectedLevel = 'moyen'"
          :class="selectedLevel === 'moyen'
            ? 'bg-amber-400 border-amber-400 text-black'
            : 'bg-slate-100 dark:bg-slate-800 border-slate-200 dark:border-slate-600 text-slate-500 dark:text-slate-400 hover:border-amber-400'"
          class="px-4 py-2 border-2 rounded-full text-sm font-semibold transition-all duration-150 cursor-pointer"
        ><span x-text="t('medium')"></span></button>
        <button type="button"
          @click="selectedLevel = 'difficile'"
          :class="selectedLevel === 'difficile'
            ? 'bg-red-500 border-red-500 text-white'
            : 'bg-slate-100 dark:bg-slate-800 border-slate-200 dark:border-slate-600 text-slate-500 dark:text-slate-400 hover:border-red-400'"
          class="px-4 py-2 border-2 rounded-full text-sm font-semibold transition-all duration-150 cursor-pointer"
        ><span x-text="t('hard')"></span></button>
      </div>

      <!-- Topics list -->
      <div class="flex flex-col gap-2 max-h-72 overflow-y-auto config-scroll pr-1 mb-4">
        <template x-for="topic in TOPICS" :key="topic">
          <div class="flex items-center justify-between bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-3 sm:px-4 py-2.5">
            <div class="flex items-center gap-2.5">
              <span class="w-2.5 h-2.5 rounded-full flex-shrink-0" :style="`background:${TOPIC_COLORS[topic]}`"></span>
              <span x-text="topic" class="text-sm font-semibold"></span>
            </div>
            <div class="flex gap-1">
              <template x-for="n in [0,1,2,3,4,5]" :key="n">
                <button type="button" type="button"
                  @click="topicSelections[topic] = n"
                  :class="topicSelections[topic] === n
                    ? 'text-white scale-110'
                    : 'bg-slate-200 dark:bg-slate-700 text-slate-500 dark:text-slate-400 hover:bg-slate-300 dark:hover:bg-slate-600'"
                  :style="topicSelections[topic] === n ? `background:${TOPIC_COLORS[topic]}` : ''"
                  class="w-7 h-7 rounded-full text-xs font-bold transition-all duration-100 cursor-pointer"
                  x-text="n"
                ></button>
              </template>
            </div>
          </div>
        </template>
      </div>

      <!-- Footer -->
      <div class="border-t border-slate-200 dark:border-slate-700 pt-4">
        <p class="text-center text-sm text-slate-500 dark:text-slate-400 mb-3">
          <span x-text="t('total_selected')"></span> <strong class="text-indigo-500 text-base" x-text="configTotal"></strong> <span x-text="t('questions_selected')"></span>
        </p>
        <div class="flex gap-2 mb-3">
          <button type="button"
            @click="setAllTopics(5)"
            class="flex-1 py-2 text-xs font-medium bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg transition-colors cursor-pointer"
          ><span x-text="t('all_to_5')"></span></button>
          <button type="button"
            @click="setAllTopics(0)"
            class="flex-1 py-2 text-xs font-medium bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg transition-colors cursor-pointer"
          ><span x-text="t('disable_all')"></span></button>
        </div>
        <button type="button"
          @click="startConfiguredQuiz()"
          :disabled="configTotal === 0"
          class="w-full py-3.5 bg-indigo-600 hover:bg-indigo-500 disabled:opacity-40 disabled:cursor-not-allowed active:scale-[.98] text-white font-bold rounded-xl transition-all duration-150 cursor-pointer text-sm sm:text-base"
        ><span x-text="t('start_quiz')"></span> →</button>
        <p
          x-show="configTotal === 0"
          class="text-center text-xs text-red-500 mt-2"
          x-text="t('select_at_least_one')"></p>
      </div>

      <button type="button"
        @click="screen = 'welcome'"
        class="w-full mt-3 py-2.5 text-sm font-semibold border-2 border-indigo-500 text-indigo-500 hover:bg-indigo-500 hover:text-white rounded-xl transition-all duration-150 cursor-pointer"
      >← <span x-text="t('back_home')"></span></button>
    </div>

    <!-- ══ QUIZ SCREEN ══ -->
    <div x-show="screen === 'quiz'"
      style="display:none"
      x-transition
    >

      <!-- Header: counter + progress + score -->
      <div class="flex items-center gap-3 mb-5">
        <span class="text-xs text-slate-500 dark:text-slate-400 whitespace-nowrap font-medium" x-text="`${currentIndex + 1} / ${activeQuiz.length}`"></span>
        <div class="flex-1 bg-slate-200 dark:bg-slate-700 rounded-full h-2 overflow-hidden">
          <div
            class="h-full bg-gradient-to-r from-indigo-500 to-violet-500 rounded-full transition-all duration-500 ease-out"
            :style="`width: ${progress}%`"
          ></div>
        </div>
        <span class="text-xs text-slate-500 dark:text-slate-400 whitespace-nowrap font-medium" x-text="`${t('score_label')} ${score}`"></span>
      </div>

      <!-- Topic badge -->
      <template x-if="currentQuestion">
        <span
          class="inline-block px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider mb-3 text-white"
          :style="`background: ${TOPIC_COLORS[currentQuestion.topic]};
            color: ${['JS','React','UML'].includes(currentQuestion.topic) ? '#000' : '#fff'}`"
          x-text="currentQuestion.topic"
        ></span>
      </template>

      <!-- Question -->
      <template x-if="currentQuestion">
        <p class="text-base sm:text-lg font-semibold leading-relaxed mb-5 prose-quiz" x-html="lang === 'fr' ? currentQuestion.q : lang === 'en' ? (currentQuestion.q_en || currentQuestion.q) : (currentQuestion.q_ar || currentQuestion.q)"></p>
      </template>

      <!-- Options -->
      <div class="flex flex-col gap-2.5 mb-4">
        <template x-if="currentQuestion">
          <template x-for="(opt, i) in (lang === 'fr' ? currentQuestion.opts : lang === 'en' ? (currentQuestion.opts_en || currentQuestion.opts) : (currentQuestion.opts_ar || currentQuestion.opts))" :key="i">
            <button type="button"
              @click="selectAnswer(i)"
              :disabled="answered"
              :class="{
                'border-emerald-500 bg-emerald-500/10': answered && i === currentQuestion.ans,
                'border-red-500 bg-red-500/10': answered && i === chosenAnswer && i !== currentQuestion.ans,
                'border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 hover:border-indigo-400 hover:bg-indigo-50 dark:hover:bg-indigo-900/20': !answered,
                'border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800': answered && i !== currentQuestion.ans && i !== chosenAnswer
              }"
              class="flex items-center gap-3 w-full border-2 rounded-xl px-4 py-3 text-left text-sm transition-all duration-150 cursor-pointer disabled:cursor-default"
            >
              <span
                :class="{
                  'bg-emerald-500 text-white': answered && i === currentQuestion.ans,
                  'bg-red-500 text-white': answered && i === chosenAnswer && i !== currentQuestion.ans,
                  'bg-slate-200 dark:bg-slate-700 text-slate-600 dark:text-slate-300': !answered || (answered && i !== currentQuestion.ans && i !== chosenAnswer)
                }"
                class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0 transition-colors duration-150"
                x-text="['A','B','C','D'][i]"
              ></span>
              <span class="prose-quiz" x-html="opt"></span>
            </button>
          </template>
        </template>
      </div>

      <!-- Feedback -->
      <div
        x-show="answered"
        x-transition
        :class="chosenAnswer === currentQuestion?.ans
          ? 'border-emerald-500 bg-emerald-500/5'
          : 'border-red-500 bg-red-500/5'"
        class="border-l-4 rounded-r-xl px-4 py-3 text-sm text-slate-600 dark:text-slate-300 mb-4 prose-quiz"
        x-html="feedbackText"
      ></div>

      <!-- Next button -->
      <button type="button" type="button"
        x-show="answered"
        x-transition
        @click="nextQuestion()"
        class="w-full py-3.5 bg-indigo-600 hover:bg-indigo-500 active:scale-[.98] text-white font-bold rounded-xl transition-all duration-150 cursor-pointer text-sm sm:text-base"
        x-text="currentIndex + 1 < activeQuiz.length ? t('next_question') + ' →' : t('see_results') + ' →'"
      ></button>
    </div>

    <!-- ══ SCORE SCREEN ══ -->
    <div x-show="screen === 'score'"
      style="display:none"
      x-transition
    >

      <!-- Score circle -->
      <div
        class="w-36 h-36 rounded-full mx-auto mb-6 flex flex-col items-center justify-center border-[6px] bg-gradient-radial from-slate-800 to-slate-950 shadow-lg"
        :style="`border-color: ${scoreColor}`"
      >
        <span class="text-4xl font-black leading-none" x-text="score"></span>
        <span class="text-xs text-slate-500 dark:text-slate-400 mt-0.5" x-text="`/ ${activeQuiz.length}`"></span>
      </div>

      <h2 class="text-xl sm:text-2xl font-extrabold text-center mb-1" x-text="`${scorePct}${t('success_rate')}`"></h2>
      <p class="text-center text-slate-500 dark:text-slate-400 text-sm mb-6" x-text="scoreMsg"></p>

      <!-- Breakdown -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 mb-7">
        <template x-for="[topic, data] in Object.entries(topicScores).filter(([,d]) => d.total > 0)" :key="topic">
          <div class="flex items-center gap-2.5 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-2.5">
            <span class="w-2.5 h-2.5 rounded-full flex-shrink-0" :style="`background:${TOPIC_COLORS[topic]}`"></span>
            <span class="text-sm font-medium" x-text="topic"></span>
            <span class="ms-auto text-sm font-bold text-indigo-400" x-text="`${data.correct} / ${data.total}`"></span>
          </div>
        </template>
      </div>

      <button type="button"
        @click="restartQuiz()"
        class="w-full py-3.5 bg-indigo-600 hover:bg-indigo-500 active:scale-[.98] text-white font-bold rounded-xl transition-all duration-150 cursor-pointer text-sm sm:text-base mb-3"
      ><span x-text="t('restart_quiz')"></span></button>
      <button type="button"
        @click="screen = 'welcome'"
        class="w-full py-3 text-sm font-semibold border-2 border-indigo-500 text-indigo-500 hover:bg-indigo-500 hover:text-white rounded-xl transition-all duration-150 cursor-pointer"
      >← <span x-text="t('back_home')"></span></button>
    </div><!-- /score screen -->

  </div><!-- /card -->

<script>
const TOPICS = ["Laravel","PHP","JS","Python","HTML","CSS","React","POO","UML"];
const TOPIC_COLORS = {
  Laravel:"#f05340", PHP:"#7c3aed", JS:"#eab308", Python:"#3b82f6",
  HTML:"#f97316", CSS:"#06b6d4", React:"#61dafb", POO:"#10b981", UML:"#f59e0b"
};

const i18n = {
  fr: {
    quiz_qcm: "Quiz QCM",
    web_tech: "Technologies Web & Développement",
    questions: "Questions",
    themes: "Thèmes",
    niveaux: "Niveaux",
    configure_quiz: "Configurer le Quiz",
    easy: "Facile",
    medium: "Moyen",
    hard: "Difficile",
    configure: "Configurer le Quiz",
    select_topic_questions: "Choisissez le niveau et le nombre de questions par thème",
    total_selected: "Total :",
    questions_selected: "questions sélectionnées",
    all_to_5: "Tout 5",
    disable_all: "Tout effacer",
    start_quiz: "Commencer le Quiz",
    select_at_least_one: "Veuillez sélectionner au moins une question",
    back_home: "Retour à l'accueil",
    score_label: "Score :",
    next_question: "Question suivante",

    get progress() {
      if (!this.activeQuiz.length) return 0;
      return (this.currentIndex / this.activeQuiz.length) * 100;
    },
    get configTotal() {
      return Object.values(this.topicSelections).reduce((a, b) => a + b, 0);
    },

    get t() {
      return (key) => this.i18n[this.lang][key] || key;
    },

    // ── Lifecycle ──
    init() {
      const saved = localStorage.getItem('dark');
      this.dark = saved !== null ? saved === 'true' : true;
      document.documentElement.classList.toggle('dark', this.dark);

      const savedLang = localStorage.getItem('lang');
      this.lang = savedLang || 'fr';
      document.documentElement.dir = this.lang === 'ar' ? 'rtl' : 'ltr';
    },

    // ── Language toggle ──
    setLang(l) {
      this.lang = l;
      this.applyLang();
      this.showLangModal = false;
    },
    applyLang() {
      localStorage.setItem('lang', this.lang);
      document.documentElement.dir = this.lang === 'ar' ? 'rtl' : 'ltr';
    },

    // ── Dark toggle ──
    toggleDark() {
      this.dark = !this.dark;
      document.documentElement.classList.toggle('dark', this.dark);
      localStorage.setItem('dark', this.dark);
    },

    // ── Config ──
    setAllTopics(n) {
      TOPICS.forEach(t => { this.topicSelections[t] = n; });
    },

    // ── Shuffle ──
    shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    },

    // ── Start quiz ──
    startConfiguredQuiz() {
      if (this.configTotal === 0) return;

      this.activeQuiz = [];
      this.topicScores = Object.fromEntries(TOPICS.map(t => [t, { correct: 0, total: 0 }]));

      TOPICS.forEach(topic => {
        const count = this.topicSelections[topic];
        if (count === 0) return;
        const pool = QUESTIONS.filter(q => q.topic === topic && q.level === this.selectedLevel);
        const selected = this.shuffle(pool).slice(0, count);
        this.activeQuiz.push(...selected);
        this.topicScores[topic].total = selected.length;
      });

      this.activeQuiz = this.shuffle(this.activeQuiz);
      this.currentIndex = 0;
      this.score = 0;
      this.answered = false;
      this.chosenAnswer = null;
      this.feedbackText = '';
      this.screen = 'quiz';
    },

    // ── Select answer ──
    selectAnswer(chosen) {
      if (this.answered) return;
      this.answered = true;
      this.chosenAnswer = chosen;

      const q = this.currentQuestion;
      const exp = this.lang === 'fr' ? q.exp : this.lang === 'en' ? (q.exp_en || q.exp) : (q.exp_ar || q.exp);

      if (chosen === q.ans) {
        this.score++;
        this.topicScores[q.topic].correct++;
        this.feedbackText = `✅ <strong>${this.t('good_answer')}</strong> ${exp}`;
      } else {
        this.feedbackText = `❌ <strong>${this.t('wrong_answer')}</strong> ${this.t('correct_was')} <strong>${['A','B','C','D'][q.ans]}</strong>. ${exp}`;
      }
    },

    // ── Next question ──
    nextQuestion() {
      this.currentIndex++;
      if (this.currentIndex < this.activeQuiz.length) {
        this.answered = false;
        this.chosenAnswer = null;
        this.feedbackText = '';
      } else {
        this.computeScore();
        this.screen = 'score';
      }
    },

    // ── Compute score ──
    computeScore() {
      const total = this.activeQuiz.length;
      this.scorePct = total > 0 ? Math.round((this.score / total) * 100) : 0;

      if (this.scorePct >= 80)      { this.scoreColor = '#22c55e'; this.scoreMsg = this.t('excellent'); }
      else if (this.scorePct >= 60) { this.scoreColor = '#eab308'; this.scoreMsg = this.t('good_result'); }
      else if (this.scorePct >= 40) { this.scoreColor = '#f97316'; this.scoreMsg = this.t('not_bad'); }
      else                          { this.scoreColor = '#ef4444'; this.scoreMsg = this.t('keep_practicing'); }
    },

    // ── Restart ──
    restartQuiz() {
      this.startConfiguredQuiz();
    }
  };
}
</script>
