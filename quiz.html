<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz QCM — Web &amp; Dev Technologies</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #273549;
      --border: #334155;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --correct: #22c55e;
      --wrong: #ef4444;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --tag-laravel: #f05340;
      --tag-php: #7c3aed;
      --tag-js: #eab308;
      --tag-python: #3b82f6;
      --tag-html: #f97316;
      --tag-css: #06b6d4;
      --tag-react: #61dafb;
      --tag-poo: #10b981;
      --tag-uml: #f59e0b;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 1.25rem;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 720px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.4);
    }

    /* ── WELCOME ── */
    .welcome-title {
      font-size: 2rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: .5rem;
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .welcome-sub {
      text-align: center;
      color: var(--muted);
      margin-bottom: 2rem;
      font-size: .95rem;
    }

    .topics-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: .75rem;
      margin-bottom: 2rem;
    }

    .topic-badge {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .35rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: .75rem;
      padding: 1rem .5rem;
      font-size: .8rem;
      font-weight: 600;
    }

    .topic-badge .dot {
      width: 12px; height: 12px;
      border-radius: 50%;
    }

    .topic-badge span { color: var(--muted); font-size: .75rem; font-weight: 400; }

    .info-row {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .info-item {
      display: flex;
      align-items: center;
      gap: .4rem;
      color: var(--muted);
      font-size: .875rem;
    }

    .info-item strong { color: var(--text); }

    .btn {
      display: block;
      width: 100%;
      padding: .9rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: .75rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s, transform .1s;
      text-align: center;
    }

    .btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .btn-outline {
      background: transparent;
      border: 2px solid var(--accent);
      color: var(--accent);
      margin-top: .75rem;
    }

    .btn-outline:hover { background: var(--accent); color: #fff; }

    /* ── QUIZ ── */
    .quiz-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.25rem;
    }

    .progress-wrap {
      flex: 1;
      background: var(--surface2);
      border-radius: 99px;
      height: 8px;
      margin: 0 1rem;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-hover));
      border-radius: 99px;
      transition: width .4s ease;
    }

    .q-count { font-size: .8rem; color: var(--muted); white-space: nowrap; }

    .topic-tag {
      display: inline-block;
      padding: .25rem .75rem;
      border-radius: 99px;
      font-size: .75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 1rem;
      color: #fff;
    }

    .topic-tag.Laravel  { background: var(--tag-laravel); }
    .topic-tag.PHP      { background: var(--tag-php); }
    .topic-tag.JS       { background: var(--tag-js); color: #000; }
    .topic-tag.Python   { background: var(--tag-python); }
    .topic-tag.HTML     { background: var(--tag-html); }
    .topic-tag.CSS      { background: var(--tag-css); }
    .topic-tag.React    { background: var(--tag-react); color: #000; }
    .topic-tag.POO      { background: var(--tag-poo); }
    .topic-tag.UML      { background: var(--tag-uml); color: #000; }

    .question-text {
      font-size: 1.1rem;
      font-weight: 600;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    .options-list {
      display: flex;
      flex-direction: column;
      gap: .65rem;
      margin-bottom: 1.5rem;
    }

    .option-btn {
      display: flex;
      align-items: center;
      gap: .75rem;
      background: var(--surface2);
      border: 2px solid var(--border);
      border-radius: .75rem;
      padding: .85rem 1rem;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      font-size: .95rem;
      color: var(--text);
      text-align: left;
    }

    .option-btn:hover:not(:disabled) {
      border-color: var(--accent);
      background: #2d3f5a;
    }

    .option-btn .letter {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: .75rem;
      font-weight: 700;
      flex-shrink: 0;
      transition: background .15s;
    }

    .option-btn.correct {
      border-color: var(--correct);
      background: rgba(34,197,94,.1);
    }

    .option-btn.correct .letter { background: var(--correct); color: #fff; }

    .option-btn.wrong {
      border-color: var(--wrong);
      background: rgba(239,68,68,.1);
    }

    .option-btn.wrong .letter { background: var(--wrong); color: #fff; }

    .option-btn:disabled { cursor: default; }

    .feedback-box {
      background: var(--surface2);
      border-radius: .75rem;
      padding: .9rem 1rem;
      font-size: .875rem;
      border-left: 4px solid var(--correct);
      color: var(--muted);
      margin-bottom: 1rem;
      display: none;
    }

    .feedback-box.show { display: block; }
    .feedback-box.wrong-fb { border-color: var(--wrong); }

    .next-btn { margin-top: .5rem; }

    /* ── SCORE ── */
    .score-circle {
      width: 140px; height: 140px;
      border-radius: 50%;
      margin: 0 auto 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: 900;
      border: 6px solid var(--accent);
      background: radial-gradient(circle, #1e293b, #0f172a);
    }

    .score-circle .score-label { font-size: .7rem; color: var(--muted); font-weight: 400; margin-top: -.3rem; }

    .score-title {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: .5rem;
    }

    .score-sub {
      text-align: center;
      color: var(--muted);
      margin-bottom: 2rem;
      font-size: .9rem;
    }

    .breakdown {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: .65rem;
      margin-bottom: 2rem;
    }

    .breakdown-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: .75rem;
      padding: .75rem 1rem;
      display: flex;
      align-items: center;
      gap: .6rem;
      font-size: .85rem;
    }

    .breakdown-item .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .breakdown-item .score-val {
      margin-left: auto;
      font-weight: 700;
      color: var(--accent-hover);
    }

    .hidden { display: none !important; }

    /* ── CONFIG SCREEN ── */
    .config-title {
      font-size: 1.5rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: .5rem;
      color: var(--text);
    }

    .config-sub {
      text-align: center;
      color: var(--muted);
      margin-bottom: 1.5rem;
      font-size: .9rem;
    }

    .level-selector {
      display: flex;
      justify-content: center;
      gap: .75rem;
      margin-bottom: 1.75rem;
    }

    .level-btn {
      padding: .6rem 1.25rem;
      border: 2px solid var(--border);
      border-radius: 99px;
      background: var(--surface2);
      color: var(--muted);
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
    }

    .level-btn:hover { border-color: var(--accent); color: var(--text); }
    .level-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .level-btn.facile.active { background: #22c55e; border-color: #22c55e; }
    .level-btn.moyen.active { background: #eab308; border-color: #eab308; color: #000; }
    .level-btn.difficile.active { background: #ef4444; border-color: #ef4444; }

    .topics-config {
      display: flex;
      flex-direction: column;
      gap: .5rem;
      margin-bottom: 1.5rem;
      max-height: 320px;
      overflow-y: auto;
      padding-right: .5rem;
    }

    .topics-config::-webkit-scrollbar { width: 6px; }
    .topics-config::-webkit-scrollbar-track { background: var(--surface2); border-radius: 3px; }
    .topics-config::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .topic-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: .75rem;
      padding: .75rem 1rem;
    }

    .topic-row-left {
      display: flex;
      align-items: center;
      gap: .65rem;
    }

    .topic-row .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .topic-row span { font-size: .9rem; font-weight: 600; }

    .pill-group {
      display: flex;
      gap: .35rem;
    }

    .pill {
      width: 28px; height: 28px;
      border: none;
      border-radius: 50%;
      background: var(--surface);
      color: var(--muted);
      font-size: .75rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
    }

    .pill:hover { background: var(--border); color: var(--text); }
    .pill.active {
      color: #fff;
      transform: scale(1.1);
    }

    .topic-row[data-topic="Laravel"] .pill.active { background: var(--tag-laravel); }
    .topic-row[data-topic="PHP"] .pill.active { background: var(--tag-php); }
    .topic-row[data-topic="JS"] .pill.active { background: var(--tag-js); }
    .topic-row[data-topic="Python"] .pill.active { background: var(--tag-python); }
    .topic-row[data-topic="HTML"] .pill.active { background: var(--tag-html); }
    .topic-row[data-topic="CSS"] .pill.active { background: var(--tag-css); }
    .topic-row[data-topic="React"] .pill.active { background: var(--tag-react); }
    .topic-row[data-topic="POO"] .pill.active { background: var(--tag-poo); }
    .topic-row[data-topic="UML"] .pill.active { background: var(--tag-uml); }

    .config-footer {
      border-top: 1px solid var(--border);
      padding-top: 1.25rem;
    }

    .config-total {
      text-align: center;
      margin-bottom: 1rem;
      font-size: .95rem;
      color: var(--muted);
    }

    .config-total strong { color: var(--accent); font-size: 1.1rem; }

    .config-actions {
      display: flex;
      gap: .5rem;
      margin-bottom: 1rem;
    }

    .config-actions button {
      flex: 1;
      padding: .65rem;
      border: 1px solid var(--border);
      border-radius: .5rem;
      background: var(--surface2);
      color: var(--muted);
      font-size: .8rem;
      cursor: pointer;
      transition: all .15s;
    }

    .config-actions button:hover { background: var(--border); color: var(--text); }

    .btn:disabled {
      opacity: .5;
      cursor: not-allowed;
      transform: none !important;
    }

    .config-hint {
      text-align: center;
      font-size: .75rem;
      color: var(--wrong);
      display: none;
    }

    .config-hint.show { display: block; }
  </style>
</head>
<body>

<div class="card">

  <!-- ══ WELCOME SCREEN ══ -->
  <div id="screen-welcome">
    <div class="welcome-title">Quiz QCM</div>
    <div class="welcome-sub">Technologies Web &amp; Développement</div>

    <button class="btn" onclick="showConfig()" style="margin-top:2rem;">
      ⚙️ Configurer le Quiz →
    </button>
  </div>
  <div id="screen-config" class="hidden">
    <div class="config-title">⚙️ Configurer le Quiz</div>
    <div class="config-sub">Choisissez le niveau et le nombre de questions par thème</div>

    <div class="level-selector">
      <button class="level-btn facile" data-level="facile" onclick="selectLevel('facile')">Facile</button>
      <button class="level-btn moyen active" data-level="moyen" onclick="selectLevel('moyen')">Moyen</button>
      <button class="level-btn difficile" data-level="difficile" onclick="selectLevel('difficile')">Difficile</button>
    </div>

    <div class="topics-config" id="topics-config"></div>

    <div class="config-footer">
      <div class="config-total">Total : <strong id="config-total">45</strong> questions sélectionnées</div>
      <div class="config-actions">
        <button onclick="setAllTopics(5)">Tout à 5</button>
        <button onclick="setAllTopics(0)">Tout désactiver</button>
      </div>
      <button class="btn" id="btn-start-config" onclick="startConfiguredQuiz()">Commencer le Quiz →</button>
      <div class="config-hint" id="config-hint">Veuillez sélectionner au moins une question</div>
    </div>
  </div>

  <!-- ══ QUIZ SCREEN ══ -->
  <div id="screen-quiz" class="hidden">
    <div class="quiz-header">
      <span class="q-count" id="q-count">1 / 30</span>
      <div class="progress-wrap">
        <div class="progress-bar" id="progress-bar" style="width:0%"></div>
      </div>
      <span class="q-count" id="score-live">Score: 0</span>
    </div>

    <div class="topic-tag" id="topic-tag">Laravel</div>
    <div class="question-text" id="question-text">Question...</div>

    <div class="options-list" id="options-list"></div>

    <div class="feedback-box" id="feedback-box"></div>

    <button class="btn next-btn" id="next-btn" onclick="nextQuestion()" style="display:none">
      Question suivante →
    </button>
  </div>

  <!-- ══ SCORE SCREEN ══ -->
  <div id="screen-score" class="hidden">
    <div class="score-circle" id="score-circle">
      <span id="final-score">0</span>
      <span class="score-label">/ 45</span>
    </div>
    <div class="score-title" id="score-title">Résultat</div>
    <div class="score-sub" id="score-sub">Voici votre performance par thème :</div>

    <div class="breakdown" id="breakdown"></div>

    <button class="btn" onclick="restartQuiz()">Recommencer le Quiz</button>
    <button class="btn btn-outline" onclick="showWelcome()">Retour à l'accueil</button>
  </div>

</div>

<script>
const TOPICS = ["Laravel","PHP","JS","Python","HTML","CSS","React","POO","UML"];
const TOPIC_COLORS = {
  Laravel: "#f05340", PHP: "#7c3aed", JS: "#eab308", Python: "#3b82f6",
  HTML: "#f97316", CSS: "#06b6d4", React: "#61dafb", POO: "#10b981", UML: "#f59e0b"
};

const QUESTIONS = [
  // ═══ LARAVEL FACILE ═══
  { topic: "Laravel", level: "facile", q: "Comment créer un nouveau projet Laravel ?", opts: ["laravel new nom", "php artisan new nom", "composer create-project laravel nom", "install laravel"], ans: 2, exp: "<code>composer create-project laravel/laravel nom</code> crée un nouveau projet." },
  { topic: "Laravel", level: "facile", q: "Quelle commande affiche la liste des routes dans Laravel ?", opts: ["php artisan route:list", "php artisan routes", "php artisan list routes", "php artisan show:routes"], ans: 0, exp: "<code>php artisan route:list</code> affiche toutes les routes enregistrées." },
  { topic: "Laravel", level: "facile", q: "Comment exécuter les migrations de base de données ?", opts: ["php artisan migrate", "php artisan db:migrate", "php artisan database:migrate", "php artisan run:migration"], ans: 0, exp: "<code>php artisan migrate</code> applique les migrations en attente." },
  { topic: "Laravel", level: "facile", q: "Quel fichier contient la configuration principale de Laravel ?", opts: [".env", "config.php", "app.php", "laravel.config"], ans: 0, exp: "Le fichier <code>.env</code> contient les variables d'environnement et la config." },
  { topic: "Laravel", level: "facile", q: "Comment ouvrir le tinker interactif dans Laravel ?", opts: ["php artisan tinker", "php artisan shell", "php artisan console", "php artisan interact"], ans: 0, exp: "<code>php artisan tinker</code> ouvre un REPL interactif pour tester du code." },

  // ═══ LARAVEL MOYEN ═══
  { topic: "Laravel", level: "moyen", q: "Quelle commande Artisan permet de créer un nouveau contrôleur ?", opts: ["php artisan make:model", "php artisan make:controller", "php artisan create:controller", "php artisan new:controller"], ans: 1, exp: "<code>php artisan make:controller NomController</code> crée un contrôleur." },
  { topic: "Laravel", level: "moyen", q: "Dans Laravel, quel fichier contient la configuration de la base de données ?", opts: [".env et config/database.php", "config/app.php", "routes/web.php", "bootstrap/app.php"], ans: 0, exp: "Les paramètres DB sont dans <code>.env</code> et lus par <code>config/database.php</code>." },
  { topic: "Laravel", level: "moyen", q: "Quelle méthode Eloquent permet de récupérer tous les enregistrements ?", opts: ["Model::find()", "Model::first()", "Model::all()", "Model::get()"], ans: 2, exp: "<code>Model::all()</code> retourne une Collection de tous les enregistrements." },
  { topic: "Laravel", level: "moyen", q: "À quoi sert le middleware <code>auth</code> ?", opts: ["Compresser les réponses HTTP", "Vérifier que l'utilisateur est authentifié", "Gérer les erreurs 404", "Valider les formulaires"], ans: 1, exp: "Le middleware <code>auth</code> protège les routes et redirige si non authentifié." },
  { topic: "Laravel", level: "moyen", q: "Comment définir une relation « un à plusieurs » dans Eloquent ?", opts: ["belongsTo()", "hasMany()", "hasManyThrough()", "morphMany()"], ans: 1, exp: "<code>hasMany()</code> est utilisé sur le modèle parent pour une relation 1:N." },

  // ═══ LARAVEL DIFFICILE ═══
  { topic: "Laravel", level: "difficile", q: "Quelle méthode utilise-t-on pour écraser un événement système dans un ServiceProvider ?", opts: ["Event::listen()", "Event::override()", "Event::subscribe()", "Event::handle()"], ans: 0, exp: "On utilise <code>Event::listen()</code> dans le boot() du ServiceProvider pour écraser un événement." },
  { topic: "Laravel", level: "difficile", q: "Comment implémenter un singleton avec Laravel Container ?", opts: ["$app->singleton()", "$app->single()", "$app->makeSingle()", "$app->instance()"], ans: 0, exp: "<code>$app->singleton('nom', closure)</code> enregistre une liaison résolue une seule fois." },
  { topic: "Laravel", level: "difficile", q: "Quel est le rôle du Morph Model dans Eloquent ( polymorphic ) ?", opts: ["Créer plusieurs relations", "Lier un modèle à plusieurs modèles parents", "Dupliquer des modèles", "Hériter dynamiquement"], ans: 1, exp: "Le Morph permet à un modèle d'appartenir à plusieurs modèles via une seule colonne." },
  { topic: "Laravel", level: "difficile", q: "Comment fonctionne le lazy loading vs eager loading dans Eloquent ?", opts: ["Eager charge tout upfront, lazy à la demande", "Lazy charge les relations uniquement après le premier accès", "Il n'y a pas de différence", "Eager désactive les relations"], ans: 0, exp: "Eager charge les relations en une seule requête (N+1 solve), lazy les charge séparément." },
  { topic: "Laravel", level: "difficile", q: "Quelle méthode de pipeline permet d'appliquer des transformations successives à une requête ?", opts: ["Pipeline::send()->through()->then()", "Request::pipe()->to()->finish()", "Query::transform()->chain()", "Route::apply()->next()"], ans: 0, exp: "Le pattern <code>Pipeline</code> permet d'enchaîner des middleware/business logic." },

  // ═══ PHP FACILE ═══
  { topic: "PHP", level: "facile", q: "Comment declares-on une variable en PHP ?", opts: ["var x = 5;", "$x = 5;", "variable x = 5;", "let x = 5;"], ans: 1, exp: "En PHP, les variables commencent par <code>$</code> : <code>$x = 5;</code>" },
  { topic: "PHP", level: "facile", q: "Quelle balise PHP est-elle utilisée pour insérer du PHP dans du HTML ?", opts: ["&lt;?php ... ?&gt;", "&lt;php&gt;...&lt;/php&gt;", "&lt;script&gt;...&lt;/script&gt;", "&lt;? ... ?&gt;"], ans: 0, exp: "Les balises <code>&lt;?php ... ?&gt;</code> sont le standard PHP." },
  { topic: "PHP", level: "facile", q: "Comment afficher du texte en PHP ?", opts: ["echo 'texte';", "print 'texte';", "Les deux A et B", "display('texte');"], ans: 2, exp: "<code>echo</code> et <code>print</code> permettent tous deux d'afficher du texte." },
  { topic: "PHP", level: "facile", q: "Comment crée-t-on un tableau indexé en PHP ?", opts: ["$tableau = array(1, 2, 3);", "$tableau = [1, 2, 3];", "Les deux A et B sont correctes", "$tableau = new Array(1, 2, 3);"], ans: 2, exp: "Les deux syntaxes <code>array()</code> et <code>[]</code> sont valides." },

// ── State ──
let currentIndex = 0;
let score = 0;
let topicScores = {};
let answered = false;
let selectedLevel = "moyen";
let topicSelections = {};
TOPICS.forEach(t => topicSelections[t] = 5);
let activeQuiz = [];



// ── Screens ──
function show(id) {
  ['screen-welcome','screen-config','screen-quiz','screen-score'].forEach(s => {
    document.getElementById(s).classList.add('hidden');
  });
  document.getElementById(id).classList.remove('hidden');
}

function showWelcome() { show('screen-welcome'); }
function showConfig() { show('screen-config'); renderConfigTopics(); }

// ── Config ──
function selectLevel(level) {
  selectedLevel = level;
  document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.level-btn.' + level).classList.add('active');
}

function renderConfigTopics() {
  const container = document.getElementById('topics-config');
  container.innerHTML = '';
  TOPICS.forEach(topic => {
    const row = document.createElement('div');
    row.className = 'topic-row';
    row.dataset.topic = topic;
    const color = TOPIC_COLORS[topic];
    row.innerHTML = `
      <div class="topic-row-left">
        <div class="dot" style="background:${color}"></div>
        <span>${topic}</span>
      </div>
      <div class="pill-group">
        ${[0,1,2,3,4,5].map(n => `<button class="pill ${topicSelections[topic]===n?'active':''}" onclick="selectPill('${topic}',${n})">${n}</button>`).join('')}
      </div>
    `;
    container.appendChild(row);
  });
  updateTotal();
}

function selectPill(topic, n) {
  topicSelections[topic] = n;
  renderConfigTopics();
}

function updateTotal() {
  const total = Object.values(topicSelections).reduce((a,b)=>a+b,0);
  document.getElementById('config-total').textContent = total;
  const btn = document.getElementById('btn-start-config');
  const hint = document.getElementById('config-hint');
  if(total===0){btn.disabled=true;hint.classList.add('show');}
  else{btn.disabled=false;hint.classList.remove('show');}
}

function setAllTopics(n) {
  TOPICS.forEach(t => topicSelections[t] = n);
  renderConfigTopics();
}

function shuffle(arr) {
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}

function startConfiguredQuiz() {
  const total = Object.values(topicSelections).reduce((a,b)=>a+b,0);
  if(total===0) return;
  
  activeQuiz = [];
  topicScores = {};
  TOPICS.forEach(t => topicScores[t] = {correct:0,total:0});
  
  TOPICS.forEach(topic => {
    const count = topicSelections[topic];
    if(count===0) return;
    const pool = QUESTIONS.filter(q=>q.topic===topic && q.level===selectedLevel);
    const shuffled = shuffle([...pool]);
    const selected = shuffled.slice(0,count);
    activeQuiz.push(...selected);
    topicScores[topic].total = selected.length;
  });
  
  activeQuiz = shuffle(activeQuiz);
  currentIndex = 0;
  score = 0;
  answered = false;
  show('screen-quiz');
  renderQuestion();
}

// ── Render Question ──
function renderQuestion() {
  answered = false;
  const q = activeQuiz[currentIndex];
  const total = activeQuiz.length;
  const progress = ((currentIndex) / total) * 100;

  document.getElementById('q-count').textContent = `${currentIndex + 1} / ${total}`;
  document.getElementById('progress-bar').style.width = progress + '%';
  document.getElementById('score-live').textContent = `Score: ${score}`;

  const tag = document.getElementById('topic-tag');
  tag.textContent = q.topic;
  tag.className = 'topic-tag ' + q.topic;

  document.getElementById('question-text').innerHTML = q.q;

  const letters = ['A', 'B', 'C', 'D'];
  const list = document.getElementById('options-list');
  list.innerHTML = '';

  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="letter">${letters[i]}</span><span>${opt}</span>`;
    btn.onclick = () => selectAnswer(i);
    list.appendChild(btn);
  });

  const fb = document.getElementById('feedback-box');
  fb.className = 'feedback-box';
  fb.innerHTML = '';

  document.getElementById('next-btn').style.display = 'none';
}

// ── Select Answer ──
function selectAnswer(chosen) {
  if (answered) return;
  answered = true;

  const q = activeQuiz[currentIndex];
  const buttons = document.querySelectorAll('.option-btn');
  buttons.forEach(b => b.disabled = true);

  topicScores[q.topic].total++;

  const fb = document.getElementById('feedback-box');

  if (chosen === q.ans) {
    buttons[chosen].classList.add('correct');
    score++;
    topicScores[q.topic].correct++;
    fb.className = 'feedback-box show';
    fb.innerHTML = `✅ <strong>Bonne réponse !</strong> ${q.exp}`;
  } else {
    buttons[chosen].classList.add('wrong');
    buttons[q.ans].classList.add('correct');
    fb.className = 'feedback-box show wrong-fb';
    fb.innerHTML = `❌ <strong>Mauvaise réponse.</strong> La bonne réponse était <strong>${['A','B','C','D'][q.ans]}</strong>. ${q.exp}`;
  }

  const nextBtn = document.getElementById('next-btn');
  nextBtn.style.display = 'block';
  nextBtn.textContent = currentIndex + 1 < activeQuiz.length ? 'Question suivante →' : 'Voir les résultats →';
}

// ── Next Question ──
function nextQuestion() {
  currentIndex++;
  if (currentIndex < activeQuiz.length) {
    renderQuestion();
  } else {
    showScore();
  }
}

// ── Score Screen ──
function showScore() {
  show('screen-score');
  const total = activeQuiz.length;
  document.getElementById('final-score').textContent = score;
  document.querySelector('.score-label').textContent = '/ ' + total;

  const pct = total>0 ? Math.round((score / total) * 100) : 0;
  const circle = document.getElementById('score-circle');
  let borderColor = '#ef4444';
  let msg = 'Continuez à pratiquer 💪';
  if (pct >= 80) { borderColor = '#22c55e'; msg = 'Excellent travail ! 🎉'; }
  else if (pct >= 60) { borderColor = '#eab308'; msg = 'Bon résultat, continuez ! 👍'; }
  else if (pct >= 40) { borderColor = '#f97316'; msg = 'Pas mal, encore un effort ! 📚'; }
  circle.style.borderColor = borderColor;

  document.getElementById('score-title').textContent = `${pct}% de réussite`;
  document.getElementById('score-sub').textContent = msg;

  const bd = document.getElementById('breakdown');
  bd.innerHTML = '';
  Object.entries(topicScores).forEach(([topic, data]) => {
    if(data.total===0) return;
    const item = document.createElement('div');
    item.className = 'breakdown-item';
    item.innerHTML = `
      <div class="dot" style="background:${TOPIC_COLORS[topic]}"></div>
      <span>${topic}</span>
      <span class="score-val">${data.correct} / ${data.total}</span>
    `;
    bd.appendChild(item);
  });
}

function restartQuiz() {
  startConfiguredQuiz();
}
</script>
